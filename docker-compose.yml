services:
  app:
    build:
      context: .
      dockerfile: mobile/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "8082:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/mobile/node_modules

  web:
    build:
      context: .
      dockerfile: mobile/Dockerfile
      target: production
      args:
        EXPO_PUBLIC_OPENROUTER_API_KEY: ${EXPO_PUBLIC_OPENROUTER_API_KEY:-}
        EXPO_PUBLIC_AI_MODEL: ${EXPO_PUBLIC_AI_MODEL:-anthropic/claude-haiku-4-5}
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-}
        EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    ports:
      - "8083:80"

  sales-page:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    ports:
      - "8084:3000"
    volumes:
      - .:/app
      - /app/web/node_modules
