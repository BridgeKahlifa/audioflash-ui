name: Promote Mobile to Production

on:
  workflow_dispatch:
    inputs:
      message:
        description: Release note shown in the EAS dashboard
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  promote:
    name: Push OTA update → production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm ci
        working-directory: ./mobile

      - name: Push OTA update to production channel
        run: |
          MESSAGE="$INPUT_MESSAGE"
          if [ -z "$MESSAGE" ]; then
            MESSAGE="Promoted to production from ${{ github.sha }}"
          fi
          eas update \
            --channel production \
            --message "$MESSAGE" \
            --non-interactive
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: 1
          INPUT_MESSAGE: ${{ inputs.message }}

      - name: Summarise
        run: |
          VERSION=$(jq -r '.expo.version' mobile/app.json)
          {
            echo "## Production promotion"
            echo ""
            echo "- **Version:** \`$VERSION\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Triggered by:** ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
