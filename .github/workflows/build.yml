name: Build Mobile App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Select which platform to build with EAS
        required: true
        default: all platforms
        type: choice
        options:
          - ios
          - android
          - all platforms
      profile:
        description: EAS build profile to use
        required: true
        default: preview
        type: string
      version:
        description: Optional semantic version override (for example 1.2.3). The current version is read from mobile/app.json at runtime. Leave blank to auto-bump patch.
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EAS_BUILD_WEBHOOK_URL: ${{ secrets.EAS_BUILD_WEBHOOK_URL }}
      EAS_BUILD_WEBHOOK_SECRET: ${{ secrets.EAS_BUILD_WEBHOOK_SECRET }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Resolve version
        id: resolve_version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          CURRENT_VERSION="$(node -p "require('./mobile/app.json').expo.version")"

          if [ -n "$INPUT_VERSION" ]; then
            NEXT_VERSION="$INPUT_VERSION"
          else
            NEXT_VERSION="$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); if (![major, minor, patch].every(Number.isInteger)) process.exit(1); console.log([major, minor, patch + 1].join('.'));" "$CURRENT_VERSION")"
          fi

          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version must use semantic versioning in the form x.y.z. Found: $CURRENT_VERSION" >&2
            exit 1
          fi

          if ! [[ "$NEXT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use semantic versioning in the form x.y.z" >&2
            exit 1
          fi

          node -e "
            const current = process.argv[1].split('.').map(Number);
            const next = process.argv[2].split('.').map(Number);
            const compare = (a, b) => {
              for (let i = 0; i < 3; i += 1) {
                if (a[i] > b[i]) return 1;
                if (a[i] < b[i]) return -1;
              }
              return 0;
            };
            if (compare(next, current) < 0) {
              console.error(\`Manual version \${process.argv[2]} cannot be lower than current version \${process.argv[1]}\`);
              process.exit(1);
            }
          " "$CURRENT_VERSION" "$NEXT_VERSION"

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Show resolved version
        shell: bash
        run: |
          {
            echo "## Mobile Build Version"
            echo ""
            echo "- Current version: \`${{ steps.resolve_version.outputs.current_version }}\`"
            echo "- Resolved version: \`${{ steps.resolve_version.outputs.next_version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update mobile version files
        shell: bash
        run: |
          NEXT_VERSION="${{ steps.resolve_version.outputs.next_version }}"
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const nextVersion = process.env.NEXT_VERSION;
          const files = [
            path.join(process.cwd(), 'mobile', 'app.json'),
            path.join(process.cwd(), 'mobile', 'package.json'),
            path.join(process.cwd(), 'mobile', 'package-lock.json'),
          ];

          for (const file of files) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));

            if (file.endsWith('app.json')) {
              json.expo.version = nextVersion;
            } else if (file.endsWith('package.json')) {
              json.version = nextVersion;
            } else if (file.endsWith('package-lock.json')) {
              json.version = nextVersion;
              if (json.packages && json.packages[""]) {
                json.packages[""].version = nextVersion;
              }
            }

            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }
          EOF
        env:
          NEXT_VERSION: ${{ steps.resolve_version.outputs.next_version }}

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/app.json mobile/package.json mobile/package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(mobile): bump version to ${{ steps.resolve_version.outputs.next_version }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Set build message
        run: echo "EAS_BUILD_MESSAGE=github-build:${{ github.run_id }}:${{ github.run_attempt }}:${{ steps.resolve_version.outputs.next_version }}" >> "$GITHUB_ENV"

      - name: Debug root
        run: ls -la

      - name: Debug mobile folder
        run: ls -la mobile

      - name: Install dependencies
        run: npm install
        working-directory: ./mobile

      - name: Expo install (sync deps)
        run: npx expo install
        working-directory: ./mobile

      - name: Resolve platform input
        id: resolve_platform
        shell: bash
        run: |
          case "${{ inputs.platform }}" in
            "ios")
              echo "eas_platform=ios" >> "$GITHUB_OUTPUT"
              ;;
            "android")
              echo "eas_platform=android" >> "$GITHUB_OUTPUT"
              ;;
            "all platforms")
              echo "eas_platform=all" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported platform input: ${{ inputs.platform }}" >&2
              exit 1
              ;;
          esac

      - name: Find existing EAS BUILD webhook
        id: find_webhook
        working-directory: ./mobile
        run: |
          npx eas-cli webhook:list --event BUILD --json > webhook-list.json
          node <<'EOF'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('webhook-list.json', 'utf8'));

          function collect(node, acc = []) {
            if (Array.isArray(node)) {
              for (const item of node) collect(item, acc);
              return acc;
            }
            if (!node || typeof node !== 'object') {
              return acc;
            }

            const id = node.id ?? node.webhookId ?? null;
            const url = node.url ?? node.webhookUrl ?? null;
            const event = node.event ?? node.webhookEvent ?? node.type ?? null;

            if (id && url && event) {
              acc.push({ id, url, event: String(event).toUpperCase() });
            }

            for (const value of Object.values(node)) {
              collect(value, acc);
            }

            return acc;
          }

          const webhooks = collect(data);
          const match = webhooks.find(
            (webhook) =>
              webhook.event === 'BUILD' &&
              webhook.url === process.env.EAS_BUILD_WEBHOOK_URL
          );

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `webhook_id=${match ? match.id : ''}\n`
          );
          EOF
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Create EAS BUILD webhook
        if: steps.find_webhook.outputs.webhook_id == ''
        working-directory: ./mobile
        run: >
          npx eas-cli webhook:create
          --event BUILD
          --url "${EAS_BUILD_WEBHOOK_URL}"
          --secret "${EAS_BUILD_WEBHOOK_SECRET}"
          --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Update EAS BUILD webhook
        if: steps.find_webhook.outputs.webhook_id != ''
        working-directory: ./mobile
        run: >
          npx eas-cli webhook:update
          --id "${{ steps.find_webhook.outputs.webhook_id }}"
          --event BUILD
          --url "${EAS_BUILD_WEBHOOK_URL}"
          --secret "${EAS_BUILD_WEBHOOK_SECRET}"
          --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        run: >
          npx eas-cli build
          --platform ${{ steps.resolve_platform.outputs.eas_platform }}
          --profile ${{ inputs.profile }}
          --message "${EAS_BUILD_MESSAGE}"
          --non-interactive
          --no-wait
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
